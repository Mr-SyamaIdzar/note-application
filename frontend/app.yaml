# Menggunakan runtime python39 lebih mudah untuk melayani file statis murni tanpa perlu package.json
runtime: python39
service: default

automatic_scaling:
  target_cpu_utilization: 0.65
  min_instances: 0
  max_instances: 1

handlers:
  # Rute utama diarahkan ke index.html
  - url: /
    static_files: index.html
    upload: index.html

  # Menangani file-file asset (css, js, dll) jika ada di masa depan
  - url: /(.*)
    static_files: \1
    upload: (.*)