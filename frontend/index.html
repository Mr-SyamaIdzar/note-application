<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CatatanKu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #f4f7e8;
        --surface: #fafcf0;
        --border: #d4dfb0;
        --text: #2a3318;
        --muted: #6b7a4a;
        --accent: #5a8a2e;
        --accent2: #c8d94a;
        --danger: #b03a2e;
        --shadow: 0 2px 12px rgba(42, 51, 24, 0.08);
        --radius: 12px;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        padding: 0 0 60px;
      }

      /* ── HEADER ── */
      header {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 20px 32px;
        display: flex;
        align-items: center;
        gap: 14px;
        position: sticky;
        top: 0;
        z-index: 100;
        box-shadow: var(--shadow);
      }
      header .logo-icon {
        width: 38px;
        height: 38px;
        background: var(--accent);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      header .logo-icon svg {
        fill: #fff;
        width: 20px;
      }
      header h1 {
        font-family: "Lora", serif;
        font-size: 1.4rem;
        font-weight: 600;
        color: var(--text);
        letter-spacing: -0.3px;
      }
      header .subtitle {
        font-size: 0.78rem;
        color: var(--muted);
        margin-left: auto;
      }

      /* ── LAYOUT ── */
      .container {
        max-width: 820px;
        margin: 0 auto;
        padding: 0 20px;
      }

      /* ── FORM CARD ── */
      .form-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 28px;
        margin: 32px 0 28px;
        box-shadow: var(--shadow);
        animation: fadeUp 0.4s ease;
      }
      .form-card h2 {
        font-family: "Lora", serif;
        font-size: 1.05rem;
        font-weight: 600;
        margin-bottom: 18px;
        color: var(--accent);
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .form-card h2::before {
        content: "";
        display: block;
        width: 4px;
        height: 18px;
        background: var(--accent);
        border-radius: 4px;
      }

      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        font-size: 0.8rem;
        font-weight: 500;
        color: var(--muted);
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }
      .form-group input,
      .form-group textarea {
        width: 100%;
        background: var(--bg);
        border: 1.5px solid var(--border);
        border-radius: 8px;
        padding: 11px 14px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.95rem;
        color: var(--text);
        outline: none;
        transition: border-color 0.2s;
        resize: vertical;
      }
      .form-group input:focus,
      .form-group textarea:focus {
        border-color: var(--accent2);
      }
      .form-group textarea {
        min-height: 110px;
      }

      .form-actions {
        display: flex;
        gap: 10px;
      }
      .btn {
        padding: 10px 22px;
        border: none;
        border-radius: 8px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        transition:
          opacity 0.15s,
          transform 0.1s;
      }
      .btn:active {
        transform: scale(0.97);
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .btn-primary:hover {
        opacity: 0.88;
      }
      .btn-ghost {
        background: transparent;
        color: var(--muted);
        border: 1.5px solid var(--border);
      }
      .btn-ghost:hover {
        background: var(--border);
      }

      /* ── SEARCH & COUNT ── */
      .list-header {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 18px;
        flex-wrap: wrap;
      }
      .list-header h2 {
        font-family: "Lora", serif;
        font-size: 1.05rem;
        font-weight: 600;
      }
      .badge {
        background: var(--accent2);
        color: var(--surface);
        font-size: 0.72rem;
        font-weight: 500;
        padding: 2px 9px;
        border-radius: 20px;
      }
      .search-box {
        margin-left: auto;
        position: relative;
      }
      .search-box input {
        background: var(--surface);
        border: 1.5px solid var(--border);
        border-radius: 8px;
        padding: 8px 14px 8px 36px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.88rem;
        color: var(--text);
        outline: none;
        width: 220px;
        transition: border-color 0.2s;
      }
      .search-box input:focus {
        border-color: var(--accent2);
      }
      .search-box svg {
        position: absolute;
        left: 11px;
        top: 50%;
        transform: translateY(-50%);
        width: 15px;
        fill: var(--muted);
      }

      /* ── NOTES GRID ── */
      .notes-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 16px;
      }

      .note-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
        box-shadow: var(--shadow);
        display: flex;
        flex-direction: column;
        gap: 10px;
        animation: fadeUp 0.35s ease;
        transition:
          box-shadow 0.2s,
          transform 0.2s;
        position: relative;
        overflow: hidden;
      }
      .note-card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 3px;
        background: linear-gradient(90deg, var(--accent), var(--accent2));
      }
      .note-card:hover {
        box-shadow: 0 6px 24px rgba(42, 51, 24, 0.13);
        transform: translateY(-2px);
      }
      .note-card .note-title {
        font-family: "Lora", serif;
        font-size: 1rem;
        font-weight: 600;
        line-height: 1.35;
        color: var(--text);
      }
      .note-card .note-body {
        font-size: 0.88rem;
        color: var(--muted);
        line-height: 1.55;
        flex: 1;
        display: -webkit-box;
        -webkit-line-clamp: 4;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .note-card .note-date {
        font-size: 0.72rem;
        color: var(--muted);
        opacity: 0.7;
        font-style: italic;
      }
      .note-card .note-actions {
        display: flex;
        gap: 8px;
        margin-top: 4px;
      }
      .btn-edit,
      .btn-delete {
        flex: 1;
        padding: 7px 0;
        border: 1.5px solid var(--border);
        border-radius: 7px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.8rem;
        font-weight: 500;
        cursor: pointer;
        background: transparent;
        transition:
          background 0.15s,
          color 0.15s;
      }
      .btn-edit {
        color: var(--accent);
      }
      .btn-edit:hover {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      .btn-delete {
        color: var(--danger);
      }
      .btn-delete:hover {
        background: var(--danger);
        color: #fff;
        border-color: var(--danger);
      }

      /* ── EMPTY STATE ── */
      .empty {
        text-align: center;
        padding: 60px 20px;
        color: var(--muted);
        grid-column: 1 / -1;
      }
      .empty svg {
        width: 48px;
        opacity: 0.35;
        margin-bottom: 14px;
      }
      .empty p {
        font-size: 0.9rem;
      }

      /* ── TOAST ── */
      #toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(20px);
        background: var(--text);
        color: var(--bg);
        padding: 10px 22px;
        border-radius: 8px;
        font-size: 0.88rem;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.25s,
          transform 0.25s;
        z-index: 9999;
        white-space: nowrap;
      }
      #toast.show {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      /* ── MODAL CONFIRM ── */
      .overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(42, 51, 24, 0.45);
        z-index: 500;
        align-items: center;
        justify-content: center;
      }
      .overlay.active {
        display: flex;
      }
      .modal {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 32px 28px;
        max-width: 340px;
        width: 90%;
        text-align: center;
        box-shadow: 0 20px 60px rgba(42, 51, 24, 0.2);
      }
      .modal h3 {
        font-family: "Lora", serif;
        margin-bottom: 10px;
      }
      .modal p {
        font-size: 0.88rem;
        color: var(--muted);
        margin-bottom: 24px;
      }
      .modal .modal-actions {
        display: flex;
        gap: 10px;
        justify-content: center;
      }
      .btn-danger {
        background: var(--danger);
        color: #fff;
        padding: 10px 22px;
        border: none;
        border-radius: 8px;
        font-family: "DM Sans", sans-serif;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
      }
      .btn-danger:hover {
        opacity: 0.85;
      }

      /* ── ANIMATIONS ── */
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(12px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* ── LOADING ── */
      .loading-row {
        grid-column: 1 / -1;
        text-align: center;
        color: var(--muted);
        font-size: 0.88rem;
        padding: 30px;
      }
      .spinner {
        display: inline-block;
        width: 18px;
        height: 18px;
        border: 2px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        vertical-align: middle;
        margin-right: 8px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <path
            d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"
          />
        </svg>
      </div>
      <h1>CatatanKu</h1>
      <span class="subtitle">Aplikasi Catatan Sederhana</span>
    </header>

    <div class="container">
      <!-- FORM -->
      <div class="form-card">
        <h2 id="form-title">Catatan Baru</h2>
        <input type="hidden" id="edit-id" />
        <div class="form-group">
          <label>Judul</label>
          <input type="text" id="judul" placeholder="Masukkan judul catatan…" />
        </div>
        <div class="form-group">
          <label>Isi Catatan</label>
          <textarea id="isi" placeholder="Tulis catatanmu di sini…"></textarea>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" onclick="simpan()">Simpan</button>
          <button
            class="btn btn-ghost"
            id="btn-batal"
            onclick="resetForm()"
            style="display: none"
          >
            Batal
          </button>
        </div>
      </div>

      <!-- LIST -->
      <div class="list-header">
        <h2>Semua Catatan</h2>
        <span class="badge" id="jumlah">0</span>
        <div class="search-box">
          <svg viewBox="0 0 24 24">
            <path
              d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"
              stroke="currentColor"
              stroke-width="2"
              fill="none"
              stroke-linecap="round"
            />
          </svg>
          <input
            type="text"
            id="search"
            placeholder="Cari catatan…"
            oninput="filter()"
          />
        </div>
      </div>

      <div class="notes-grid" id="notes-grid">
        <div class="loading-row">
          <span class="spinner"></span> Memuat catatan…
        </div>
      </div>
    </div>

    <!-- CONFIRM MODAL -->
    <div class="overlay" id="overlay">
      <div class="modal">
        <h3>Hapus Catatan?</h3>
        <p>Catatan ini akan dihapus permanen dan tidak bisa dikembalikan.</p>
        <div class="modal-actions">
          <button class="btn btn-ghost" onclick="tutupModal()">Batal</button>
          <button class="btn-danger" id="btn-konfirm-hapus">Ya, Hapus</button>
        </div>
      </div>
    </div>

    <div id="toast"></div>

    <script>
      // PENTING: Ganti URL di bawah ini dengan URL backend Cloud Run Anda!
      // Contoh: const API = "https://be-rest-xxxxx-uc.a.run.app/api/notes";
      const API = "https://be-rest-805566040091.us-central1.run.app/api/notes";
      let semuaCatatan = [];
      let hapusId = null;

      /* ── FETCH ALL ── */
      async function muat() {
        try {
          const res = await fetch(API);
          semuaCatatan = await res.json();
          render(semuaCatatan);
        } catch {
          grid().innerHTML = `<div class="empty"><p>⚠️ Tidak dapat terhubung ke server.<br/><small>Pastikan Express.js berjalan di port 3000.</small></p></div>`;
          // Demo mode: tunjukkan data contoh
          semuaCatatan = [
            {
              id: 1,
              judul: "Belanja Mingguan",
              isi: "Beras, telur, minyak, sabun, shampo, teh, kopi, susu.",
              tanggal_dibuat: "2025-03-20T09:00:00Z",
            },
            {
              id: 2,
              judul: "Rencana Belajar",
              isi: "Pelajari Express.js dan MySQL. Buat REST API sederhana untuk proyek akhir semester.",
              tanggal_dibuat: "2025-03-21T14:30:00Z",
            },
            {
              id: 3,
              judul: "Ide Proyek",
              isi: "Aplikasi manajemen tugas berbasis web dengan notifikasi real-time menggunakan Socket.io.",
              tanggal_dibuat: "2025-03-22T08:15:00Z",
            },
            {
              id: 4,
              judul: "Catatan Kuliah",
              isi: "Cloud Computing: Perbedaan IaaS, PaaS, SaaS. Virtual Machine vs Container. Deploy ke GCP.",
              tanggal_dibuat: "2025-03-23T11:00:00Z",
            },
          ];
          render(semuaCatatan);
          toast("Mode demo — server tidak terhubung");
        }
      }

      /* ── RENDER ── */
      function render(data) {
        document.getElementById("jumlah").textContent = data.length;
        if (!data.length) {
          grid().innerHTML = `<div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm-1 1.5L18.5 9H13V3.5z"/></svg>
        <p>Belum ada catatan.<br/>Buat catatan pertamamu di atas!</p></div>`;
          return;
        }
        grid().innerHTML = data
          .map(
            (n) => `
      <div class="note-card" id="card-${n.id}">
        <div class="note-title">${esc(n.judul)}</div>
        <div class="note-body">${esc(n.isi)}</div>
        <div class="note-date">${formatTgl(n.tanggal_dibuat)}</div>
        <div class="note-actions">
          <button class="btn-edit" onclick="mulaiEdit(${n.id})">✏️ Edit</button>
          <button class="btn-delete" onclick="konfirmHapus(${n.id})">🗑️ Hapus</button>
        </div>
      </div>`,
          )
          .join("");
      }

      /* ── FILTER ── */
      function filter() {
        const q = document.getElementById("search").value.toLowerCase();
        const hasil = semuaCatatan.filter(
          (n) =>
            n.judul.toLowerCase().includes(q) ||
            n.isi.toLowerCase().includes(q),
        );
        render(hasil);
      }

      /* ── SIMPAN (ADD / EDIT) ── */
      async function simpan() {
        const judul = document.getElementById("judul").value.trim();
        const isi = document.getElementById("isi").value.trim();
        const id = document.getElementById("edit-id").value;
        if (!judul || !isi) {
          toast("Judul dan isi tidak boleh kosong!");
          return;
        }

        const payload = { judul, isi };
        const isEdit = !!id;
        const url = isEdit ? `${API}/${id}` : API;
        const method = isEdit ? "PUT" : "POST";

        try {
          const res = await fetch(url, {
            method,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          if (!res.ok) throw new Error();
          toast(
            isEdit
              ? "Catatan berhasil diperbarui!"
              : "Catatan berhasil ditambahkan!",
          );
          resetForm();
          muat();
        } catch {
          // Demo mode
          if (isEdit) {
            const idx = semuaCatatan.findIndex((n) => n.id == id);
            if (idx > -1) {
              semuaCatatan[idx].judul = judul;
              semuaCatatan[idx].isi = isi;
            }
            toast("Catatan diperbarui (demo)");
          } else {
            semuaCatatan.unshift({
              id: Date.now(),
              judul,
              isi,
              tanggal_dibuat: new Date().toISOString(),
            });
            toast("Catatan ditambahkan (demo)");
          }
          render(semuaCatatan);
          resetForm();
        }
      }

      /* ── EDIT ── */
      function mulaiEdit(id) {
        const n = semuaCatatan.find((x) => x.id === id);
        if (!n) return;
        document.getElementById("edit-id").value = id;
        document.getElementById("judul").value = n.judul;
        document.getElementById("isi").value = n.isi;
        document.getElementById("form-title").textContent = "Edit Catatan";
        document.getElementById("btn-batal").style.display = "";
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      function resetForm() {
        document.getElementById("edit-id").value = "";
        document.getElementById("judul").value = "";
        document.getElementById("isi").value = "";
        document.getElementById("form-title").textContent = "Catatan Baru";
        document.getElementById("btn-batal").style.display = "none";
      }

      /* ── DELETE ── */
      function konfirmHapus(id) {
        hapusId = id;
        document.getElementById("overlay").classList.add("active");
        document.getElementById("btn-konfirm-hapus").onclick = () => hapus(id);
      }
      function tutupModal() {
        document.getElementById("overlay").classList.remove("active");
        hapusId = null;
      }

      async function hapus(id) {
        tutupModal();
        try {
          const res = await fetch(`${API}/${id}`, { method: "DELETE" });
          if (!res.ok) throw new Error();
          toast("Catatan dihapus!");
          muat();
        } catch {
          semuaCatatan = semuaCatatan.filter((n) => n.id !== id);
          render(semuaCatatan);
          toast("Catatan dihapus (demo)");
        }
      }

      /* ── HELPERS ── */
      function grid() {
        return document.getElementById("notes-grid");
      }
      function esc(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }
      function formatTgl(d) {
        return new Date(d).toLocaleDateString("id-ID", {
          day: "numeric",
          month: "long",
          year: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        });
      }
      function toast(msg) {
        const el = document.getElementById("toast");
        el.textContent = msg;
        el.classList.add("show");
        setTimeout(() => el.classList.remove("show"), 2800);
      }

      // Tutup modal saat klik overlay
      document.getElementById("overlay").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) tutupModal();
      });

      muat();
    </script>
  </body>
</html>
